name: Deploy → Supabase

on:
  push:
    branches:
      - main
  workflow_dispatch: # permite trigger manual pelo painel do GitHub

jobs:
  deploy:
    name: Migrate DB + Deploy Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Instala o Supabase CLI via action oficial
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # project_id lido automaticamente do supabase/config.toml
      - name: Link Supabase project
        run: supabase link --project-ref wfxaeibeyjvgvboypqtd
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Aplica migrations pendentes (supabase/migrations/*.sql)
      - name: Apply DB migrations
        run: supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Faz deploy de todas as Edge Functions em supabase/functions/
      - name: Deploy Edge Functions
        run: supabase functions deploy --no-verify-jwt redirect-engine
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
