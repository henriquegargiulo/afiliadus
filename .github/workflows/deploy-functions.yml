name: Deploy → Edge Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref wfxaeibeyjvgvboypqtd
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Detect changed functions
        id: changes
        run: |
          git fetch origin main --depth=2
          SHARED_CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'supabase/functions/_shared/' | wc -l)

          # Se _shared mudou, redeploya todas as funções
          if [ "$SHARED_CHANGED" -gt 0 ]; then
            CHANGED="redirect-engine create-link daily-discovery minha-curadoria buscar-precos"
            echo "Shared mudou — redeploy completo"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'supabase/functions/' \
              | grep -oP 'supabase/functions/\K[^/]+' \
              | grep -v '^_' \
              | sort -u)
          fi

          echo "functions<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Funções a deployar: $CHANGED"

      - name: Deploy changed functions
        if: steps.changes.outputs.functions != ''
        run: |
          ALLOWED="redirect-engine create-link daily-discovery minha-curadoria buscar-precos"
          echo "${{ steps.changes.outputs.functions }}" | while read fn; do
            [ -z "$fn" ] && continue
            if echo "$ALLOWED" | grep -qw "$fn"; then
              echo "→ Deployando $fn"
              if [ "$fn" = "buscar-precos" ]; then
                supabase functions deploy "$fn" --no-verify-jwt
              else
                supabase functions deploy "$fn"
              fi
            else
              echo "⚠ Ignorando função desconhecida: $fn"
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
